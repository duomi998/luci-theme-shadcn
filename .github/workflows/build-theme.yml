name: luci-theme-shadcn Build & Release

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - "feat/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build luci-theme-shadcn ${{ matrix.pkg_type }}
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref_type == 'tag' ||
      contains(github.event.head_commit.message, '[build]')
    strategy:
      matrix:
        pkg_type: [ipk, apk]
    steps:
      - uses: eamonxg/build-luci-package@master
        with:
          package: luci-theme-shadcn
          pkg_type: ${{ matrix.pkg_type }}
          prep_script: |
            ./scripts/feeds update -f base luci
            ./scripts/feeds install -p luci-base
          artifact_paths: |
            bin/packages/$ARCH/base/*luci-theme-shadcn*.[ai]pk
          release_body_repo: eamonxg/assets
          release_body_path: shadcn/docs/changelog/${{ github.ref_name }}.md
